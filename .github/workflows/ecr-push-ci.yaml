name: Build and Push to ECR

on:
  push:
    branches: [dev-prod]

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: feature-engineering-pipeout

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ARN_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          DOCKERFILE_PATH: infra/Dockerfile
        run: |
          docker build -f $DOCKERFILE_PATH -t $ECR_REGISTRY/${{ env.IMAGE_NAME }}:$IMAGE_TAG .
          docker build -f $DOCKERFILE_PATH -t $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest .
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.IMAGE_NAME }}:latest
